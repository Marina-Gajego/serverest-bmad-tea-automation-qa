[workflow]

persistent_facts = [
  "Este projeto automatiza a API ServeRest com Java 17, Maven, REST Assured 5.4.0, Cucumber 7.15.0, JUnit Platform, AssertJ, Lombok, Java Faker e JSON Schema Validator.",
  "Gerar automacao de API, nao automacao UI/browser, salvo pedido explicito do usuario.",
  "Manter a estrutura existente: src/test/java/br/com/marina/qa/context, factory, model, paths, runner, services e stepsDefinitions; features em src/test/resources/features; schemas em src/test/resources/schemas.",
  "Nao criar uma nova arquitetura, novo framework HTTP, novo runner ou novo padrao de pastas quando ja houver equivalente no projeto.",
  "Para novos endpoints, criar ou reutilizar classes por dominio em services/<Dominio>, factory/<Dominio>, model/<Dominio>, stepsDefinitions/<Dominio>, features/<Dominio> e schemas/<Dominio>.",
  "Services devem concentrar as chamadas REST Assured com given(), baseUri(BASE_URL), basePath do endpoint em Paths, contentType application/json quando houver body, headers necessarios e retorno de io.restassured.response.Response.",
  "Nao duplicar chamadas RestAssured diretamente nos steps quando houver ou couber um Service; steps devem orquestrar contexto, chamar services/factories e validar respostas.",
  "Factories devem criar payloads validos e variacoes invalidas usando Java Faker com Locale pt-BR, UUID para dados unicos quando necessario e builders/toBuilder dos models.",
  "Models de payload devem seguir Lombok com @Data, @Builder(toBuilder = true), @NoArgsConstructor, @AllArgsConstructor e @JsonInclude(JsonInclude.Include.NON_NULL).",
  "Usar ScenarioContext para compartilhar response, payload, token e dados dinamicos entre steps do mesmo cenario; nao usar estado global estatico para dados de teste.",
  "Ao gerar steps Cucumber, usar cucumber expressions com tipos como {int}, {string} e {double}; nao usar regex para novos steps.",
  "Manter os textos de Features e Step Definitions em ingles, seguindo o estilo atual: Given/When/Then/And e nomes como 'I have...', 'I send...', 'The response should...'.",
  "Features devem incluir tags @regression e tag de dominio como @Login, @Users ou @products; manter placeholder @id= quando seguir o padrao dos arquivos existentes.",
  "Cenarios devem declarar endpoint e verbo no titulo quando possivel, por exemplo '(POST /usuarios)' ou '(GET /usuarios/{_id})'.",
  "Priorizar Scenario Outline com Examples para matrizes de campos obrigatorios, tipos invalidos, null, empty, formatos invalidos e mensagens esperadas.",
  "Para validacoes comuns, reutilizar CommonsSteps: status code, mensagem no body, lista de mensagens de erro, payload JSON malformado e validacao de contrato por schema.",
  "Todo fluxo de sucesso e erros relevantes deve validar status code e mensagem esperada quando a API retornar message.",
  "Sempre que houver contrato existente ou novo schema aplicavel, adicionar validacao com 'The response contract should match {string}' apontando para schemas/<Dominio>/<arquivo>.schema.json.",
  "Criar schemas JSON em src/test/resources/schemas/<Dominio> para respostas novas quando a automacao introduzir novo contrato relevante.",
  "Usar AssertJ para asserts em steps; mensagens de assert devem explicar a intencao da validacao.",
  "Nao hardcodar BASE_URL nos testes; usar Paths.BASE_URL, que resolve System property base.url, env BASE_URL ou http://localhost:3000.",
  "Novos endpoints devem ser adicionados em br.com.marina.qa.paths.Paths como constantes com nomes em UPPER_SNAKE_CASE.",
  "Para autenticacao, reutilizar o fluxo existente de usuario autenticado e token no ScenarioContext; requests protegidas devem enviar header Authorization com o token do contexto.",
  "Dados de teste devem ser independentes por cenario; criar usuarios/produtos via API/factory no setup do proprio cenario quando necessario.",
  "Nao depender de ordem de execucao entre cenarios, dados preexistentes na API ou IDs fixos.",
  "Evitar sleeps arbitrarios; quando a API precisar de tempo de consistencia, manter uma espera curta, explicita e centralizada no service responsavel.",
  "Nao hardcodar token, credenciais pessoais, IDs dinamicos ou emails fixos para massa principal; usar factories e dados unicos.",
  "Manter logs com Lombok @Slf4j quando fizer sentido, mas nao logar segredos sensiveis desnecessariamente.",
  "Executar e orientar validacao com mvn test; para filtro de tags, usar mvn test -Dcucumber.filter.tags=\"@tag\".",
  "Antes de criar novo step, procurar steps existentes em src/test/java/br/com/marina/qa/stepsDefinitions/ para evitar duplicidade de frases Cucumber.",
  "Antes de implementar novos testes, comparar com o fluxo equivalente ja existente no repo para copiar o nivel certo de responsabilidade entre Feature, Steps, Factory, Service e Model.",
  "StepsDefinitions devem ser orquestradores: nao construir payloads com builders diretamente, nao popular Maps manualmente e nao concentrar regras de massa; usar factories existentes ou criar metodos de factory com nomes claros.",
  "Quando um step precisar criar massa auxiliar, por exemplo outro usuario ou outro produto para validar duplicidade, a massa deve vir da factory do dominio, seguindo o padrao de PutUsersByIdSteps com CreateUsersFactory.",
  "Nao criar helpers privados em StepsDefinitions para uso unico; deixar a logica no metodo chamador ou mover para Factory/Service quando houver reuso real ou regra de dominio.",
  "Antes de adicionar novos bindings Cucumber, procurar frases similares e preferir consolidar variacoes de request/payload em um unico step parametrizado por condicao, desde que a feature continue legivel.",
  "Para Scenario Outline de variacoes de payload, preferir coluna condition com valores expressivos como 'missing nome', 'empty body', 'invalid token' e mapear essas condicoes em um unico step, evitando metodos quase identicos.",
  "Factories devem expor metodos especificos para massas especiais, como duplicidade, campos ausentes, campos nulos, formatos invalidos e campos extras; Steps nao devem saber como esses objetos sao montados internamente.",
  "Depois de gerar automacao, revisar o codigo procurando tres anti-padroes: builder/model direto no step, duplicacao de step definitions para a mesma acao HTTP e metodos privados de uso unico."
]
